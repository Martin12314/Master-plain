<!-- www/login.html -->
<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="/styles.css">
    <style>
        .card { max-width: 860px; padding:1rem; border:1px solid #ddd; border-radius:.5rem; }
        .row { display:flex; gap:.75rem; align-items:center; flex-wrap:wrap; }
        .muted { color:#555; }
        .bad { color:#b00020; font-weight:600; }
        .good { color:#056e00; font-weight:600; }
        .logbox {
          background:#0b1020;
          color:#d0d7ff;
          padding:1rem;
          border-radius:.5rem;
          max-height:340px;
          overflow:auto;
          font-size:.85rem;
          white-space:pre-wrap;
          word-break:break-word;
        }
    </style>
</head>
<body>
<h1>Login</h1>

<div class="card">
    <div class="row">
        <label>Username <input id="user" value="alice" autocomplete="username"></label>
        <label>Password <input id="pass" type="password" value="secret" autocomplete="current-password"></label>
    </div>

    <div class="row" style="margin-top:.5rem">
        <button id="loginBtn" disabled>Sign in</button>
        <button id="badReqDigestBtn" disabled>Wrong request digest</button>
        <button id="badRespDigestBtn" disabled>Wrong response digest</button>
        <button id="wrongHostKeyBtn" disabled>Wrong host key from SW</button>
    </div>

    <div class="row">
        <label><input type="checkbox" id="allowUnsafe"> allow unsafe key (for tests)</label>
        <label><input type="checkbox" id="verbose"> verbose logs</label>
    </div>

    <div class="row">
        <span id="kxStatus" class="muted">Protected flow not initialized yet…</span>
    </div>
</div>

<h3>Security + app log</h3>
<pre id="security-log" class="logbox">Waiting for Service Worker…</pre>

<script type="module">
    import { CompactEncrypt, importJWK } from 'https://cdn.jsdelivr.net/npm/jose@5.3.0/+esm';

    const secLog = document.getElementById('security-log');
    const kxStatus = document.getElementById('kxStatus');
    const loginBtn = document.getElementById('loginBtn');
    const badReqDigestBtn = document.getElementById('badReqDigestBtn');
    const badRespDigestBtn = document.getElementById('badRespDigestBtn');
    const wrongHostKeyBtn = document.getElementById('wrongHostKeyBtn');
    const allowUnsafe = document.getElementById('allowUnsafe');
    const verbose = document.getElementById('verbose');

    function nowTs() {
      return new Date().toISOString();
    }

    function appendLog(line) {
      secLog.textContent += line + '\n';
      secLog.scrollTop = secLog.scrollHeight;
    }

    function pageLog(...args) {
      appendLog(`[${nowTs()}] [PAGE] ${args.join(' ')}`);
    }

    navigator.serviceWorker?.addEventListener('message', e => {
      if (e.data?.type === 'SW_LOG') {
        appendLog(`[${e.data.ts}] [SW] ${e.data.message}`);
      }
    });

    function setKx(ok, msg) {
      kxStatus.innerHTML = ok
        ? `<span class="good">${msg}</span>`
        : `<span class="bad">${msg}</span>`;
    }

    function maybeShort(s) {
      if (verbose.checked) return s;
      if (!s) return s;
      if (s.length <= 90) return s;
      return s.slice(0, 45) + ' … ' + s.slice(-32) + ` (len=${s.length})`;
    }

    let jweKey = null;
    let kid = null;
    let kxOK = false;
    let reqSignOK = false;

    function refreshButtons() {
      const protectedEnabled = ((kxOK && reqSignOK) || allowUnsafe.checked);
      loginBtn.disabled = !protectedEnabled;
      badReqDigestBtn.disabled = !protectedEnabled;
      badRespDigestBtn.disabled = !protectedEnabled;
      wrongHostKeyBtn.disabled = !protectedEnabled;
    }

    allowUnsafe.addEventListener('change', refreshButtons);

    async function swActive() {
      const reg = await navigator.serviceWorker.ready;
      return navigator.serviceWorker.controller || reg.active || reg.waiting || reg.installing;
    }

    function waitForSWMessage(types, timeoutMs = 6000) {
      const wanted = new Set(Array.isArray(types) ? types : [types]);

      return new Promise((resolve, reject) => {
        const t = setTimeout(() => {
          navigator.serviceWorker.removeEventListener('message', onMsg);
          reject(new Error('Timed out waiting for SW message: ' + Array.from(wanted).join(',')));
        }, timeoutMs);

        function onMsg(ev) {
          const type = ev?.data?.type;
          if (!wanted.has(type)) return;
          clearTimeout(t);
          navigator.serviceWorker.removeEventListener('message', onMsg);
          resolve(ev.data);
        }

        navigator.serviceWorker.addEventListener('message', onMsg);
      });
    }

    async function initKey() {
      try {
        const active = await swActive();
        if (!active) throw new Error('No active Service Worker');

        pageLog('Requesting protected-flow state from Service Worker');
        const msgPromise = waitForSWMessage('PROTECTED_FLOW_STATE', 10000);
        active.postMessage({ type: 'GET_PROTECTED_FLOW_STATE' });
        const msg = await msgPromise;

        if (!msg?.ok) {
          throw new Error(msg?.message || 'SW protected-flow init failed');
        }

        const jwk = msg.hostJweJwk;
        if (!jwk?.n || !jwk?.e) {
          throw new Error('Missing host JWE key from Service Worker');
        }

        kid = jwk.kid || '(no-kid)';
        pageLog('Received host JWE key from SW kid=', kid);

        jweKey = await importJWK(
          { kty: 'RSA', n: jwk.n, e: jwk.e, alg: 'RSA-OAEP-256' },
          'RSA-OAEP-256'
        );

        kxOK = true;
        reqSignOK = !!msg.reqSignReady;

        setKx(true, 'Protected flow OK (JWE key + SW request signing ready)');
        pageLog('Host JWE public key imported');
        pageLog('SW request-sign ready kid=', msg.reqSignKid || '(none)');
      } catch (e) {
        kxOK = false;
        reqSignOK = false;
        setKx(false, 'Protected flow init failed: ' + (e.message || e));
        pageLog('Init failed:', e.message || String(e));
        console.error(e);
      } finally {
        refreshButtons();
      }
    }

    async function enc(plaintext) {
      const ce = new CompactEncrypt(new TextEncoder().encode(plaintext));
      ce.setProtectedHeader({ alg: 'RSA-OAEP-256', enc: 'A256GCM', kid });
      return await ce.encrypt(jweKey);
    }

    async function doProtectedOnce(demo = '') {
      if (!(kxOK && reqSignOK) && !allowUnsafe.checked) {
        throw new Error('Protected flow not ready. Check logs.');
      }
      if (!jweKey) {
        throw new Error('JWE key missing. Check logs.');
      }

      const u = document.getElementById('user').value || '';
      const p = document.getElementById('pass').value || '';

      pageLog('Encrypting credentials…');

      const uEnc = await enc(u);
      const pEnc = await enc(p);

      pageLog('Encrypted username:', maybeShort(uEnc));
      pageLog('Encrypted password:', maybeShort(pEnc));

      const bodyObj = {
        username: 'JWE: ' + uEnc,
        password: 'JWE: ' + pEnc
      };
      const bodyStr = JSON.stringify(bodyObj);

      const url = demo ? `/api/login?demo=${encodeURIComponent(demo)}` : '/api/login';
      pageLog('Sending POST', url);

      const r = await fetch(url, {
        method: 'POST',
        cache: 'no-store',
        headers: {
          'Content-Type': 'application/json'
        },
        body: bodyStr
      });

      pageLog('Login HTTP', r.status, r.statusText);

      const txt = await r.text();
      pageLog('Login response body:', txt);

      let j = null;
      try {
        j = JSON.parse(txt);
      } catch {}

      return { ok: !!j?.ok, status: r.status, text: txt };
    }

    async function doLoginNormal() {
      const res = await doProtectedOnce('');
      if (res.ok) {
        pageLog('Login OK → redirect /index.html');
        location.href = '/index.html';
      } else {
        pageLog('Login failed');
        alert('Login failed. See log.');
      }
    }

    async function doWrongRequestDigest() {
      const res = await doProtectedOnce('req-bad-digest');
      if (!res.ok) {
        pageLog('Wrong request digest demo complete. Check host logs for received vs expected request digest.');
      }
    }

    async function doWrongResponseDigest() {
      const res = await doProtectedOnce('resp-bad-digest');
      if (!res.ok) {
        pageLog('Wrong response digest demo complete. Check SW logs above for received vs computed response digest.');
      }
    }

    async function doWrongHostKeyDemo() {
      const active = await swActive();
      if (!active) {
        throw new Error('No active Service Worker');
      }

      pageLog('Running wrong host key demo for /req-key/register');
      const msgPromise = waitForSWMessage('HOST_WRONG_CLIENT_KEY_DEMO_DONE', 10000);
      active.postMessage({ type: 'RUN_HOST_WRONG_CLIENT_KEY_DEMO' });
      const msg = await msgPromise;

      if (msg.ok) {
        pageLog('Wrong host key demo complete. The SW detected that the host returned a different public key hash/thumbprint.');
      } else {
        pageLog('Wrong host key demo unexpected result:', msg.message || 'unknown');
      }
    }

    initKey();

    loginBtn.addEventListener('click', e => {
      e.preventDefault();
      doLoginNormal().catch(err => {
        pageLog('Login ERROR:', err.message || String(err));
        alert('Login error: ' + (err.message || err));
      });
    });

    badReqDigestBtn.addEventListener('click', e => {
      e.preventDefault();
      doWrongRequestDigest().catch(err => {
        pageLog('Wrong request digest ERROR:', err.message || String(err));
        alert('Request digest demo error: ' + (err.message || err));
      });
    });

    badRespDigestBtn.addEventListener('click', e => {
      e.preventDefault();
      doWrongResponseDigest().catch(err => {
        pageLog('Wrong response digest ERROR:', err.message || String(err));
        alert('Response digest demo error: ' + (err.message || err));
      });
    });

    wrongHostKeyBtn.addEventListener('click', e => {
      e.preventDefault();
      doWrongHostKeyDemo().catch(err => {
        pageLog('Wrong host key demo ERROR:', err.message || String(err));
        alert('Wrong host key demo error: ' + (err.message || err));
      });
    });
</script>
</body>
</html>
